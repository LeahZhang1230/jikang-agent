# Render Blueprint for 嵇康智能体
# 部署步骤：
# 1. 将 jikang_web 目录推送到 GitHub 仓库
# 2. 在 Render Dashboard 创建 Blueprint 或手动新建 Web Service
# 3. 在 Environment 中设置 GLM_API_KEY
# 4. Render 会自动拉取代码、安装依赖并部署

services:
  - type: web
    name: jikang-agent
    runtime: python
    plan: free
    region: singapore  # 离中国最近的节点，国内访问相对较快
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: GLM_API_KEY
        sync: false  # 不在配置文件中暴露，请在 Dashboard 手动设置
      - key: GLM_MODEL
        value: glm-4-flash
      - key: PYTHON_VERSION
        value: 3.11.0
