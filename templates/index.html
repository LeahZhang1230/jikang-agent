<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嵇康智能体 · 与叔夜对坐</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.loli.net/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-overlay"></div>
    
    <div class="app-container">
        <!-- 顶部标题 -->
        <header class="chat-header">
            <div class="header-inner">
                <div class="avatar-section">
                    <div class="avatar">
                        <span>嵇</span>
                    </div>
                    <div class="header-info">
                        <h1>嵇康</h1>
                        <p class="subtitle">字叔夜 · 竹林七贤之首 · 景元三年</p>
                    </div>
                </div>
                <div class="header-actions">
                    <button id="clearBtn" class="icon-btn" title="清空对话">清空</button>
                    <button id="aboutBtn" class="icon-btn" title="关于">关于</button>
                </div>
            </div>
        </header>

        <!-- 聊天区域 -->
        <main class="chat-main" id="chatMain">
            <div class="welcome-message">
                <div class="welcome-icon">🎋</div>
                <h2>松下风来，与君对坐</h2>
                <p>吾乃嵇康，字叔夜。子有何事，但说无妨。</p>
                <div class="suggested-questions">
                    <button class="suggestion" data-text="请谈《广陵散》">《广陵散》</button>
                    <button class="suggestion" data-text="何为声无哀乐？">声无哀乐</button>
                    <button class="suggestion" data-text="与山巨源绝交，何故？">与山巨源绝交书</button>
                    <button class="suggestion" data-text="君如何养生？">养生之道</button>
                </div>
            </div>
            <!-- 消息将动态插入这里 -->
        </main>

        <!-- 输入区域 -->
        <footer class="chat-footer">
            <div class="input-area">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="messageInput" 
                        placeholder="向叔夜发问……" 
                        autocomplete="off"
                        maxlength="500"
                    >
                    <button id="sendBtn" class="send-btn">
                        <span>发送</span>
                    </button>
                </div>
                <div class="input-hint">
                    <span>按 Enter 发送 · 嵇康所知止于262年</span>
                </div>
            </div>
        </footer>
    </div>

    <!-- 关于弹窗 -->
    <div id="aboutModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeModal">&times;</span>
            <h3>关于</h3>
            <p>此网页基于《嵇康集》《世说新语》《晋书》等史料构建。</p>
            <p>嵇康（223—262），字叔夜，谯国铚县人。竹林七贤之首，临刑前索琴奏《广陵散》，叹曰："广陵散于今绝矣！"</p>
            <p>知识边界严格截止于景元三年（262年），此后之事，彼不知也。</p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
